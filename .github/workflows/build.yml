name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen

      - name: Generate Xcode project
        run: cd FloateingSights4var2 && xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project FloateingSights4var2/FloateingSights4var2.xcodeproj \
            -scheme FloateingSights4var2 \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""
