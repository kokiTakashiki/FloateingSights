name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: |
          xcodebuild -project FloateingSights4var2/FloateingSights4var2.xcodeproj \
            -list

      - name: Build
        run: |
          xcodebuild build \
            -project FloateingSights4var2/FloateingSights4var2.xcodeproj \
            -scheme FloateingSights4var2 \
            -destination 'generic/platform=iOS Simulator' \
            SWIFT_VERSION=5 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""
